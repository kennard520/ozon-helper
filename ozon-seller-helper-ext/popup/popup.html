<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      width: 360px;
      margin: 0;
      padding: 14px;
      font: 13px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f3f6fb;
    }
    .shell {
      overflow: hidden;
      border: 1px solid #dce5f2;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 14px 38px rgba(17, 24, 39, 0.12);
    }
    .head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid #edf1f7;
    }
    .logo {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #005bff;
      color: #fff;
      font-weight: 900;
    }
    h1 { margin: 0; font-size: 16px; line-height: 1.2; }
    .sub { color: #667085; font-size: 12px; margin-top: 2px; }
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 14px;
      padding: 10px 12px;
      border: 1px solid #e5ebf3;
      border-radius: 12px;
      background: #fbfcfe;
    }
    .dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      margin-right: 6px;
      border-radius: 50%;
      background: #f59e0b;
    }
    .status.ok .dot { background: #22c55e; }
    .status.bad .dot { background: #ef4444; }
    .card {
      margin: 12px 14px;
      padding: 12px;
      border: 1px solid #e5ebf3;
      border-radius: 12px;
      background: #fff;
    }
    .card-title { margin-bottom: 8px; font-weight: 800; }
    .flow {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }
    .flow span {
      padding: 8px 6px;
      border-radius: 10px;
      background: #f4f7fb;
      color: #475467;
      font-size: 12px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 36px;
      margin-top: 8px;
      padding: 0 10px;
      border: 1px solid #d8e0eb;
      border-radius: 10px;
      outline: none;
      font: inherit;
    }
    input:focus {
      border-color: #005bff;
      box-shadow: 0 0 0 3px rgba(0, 91, 255, .12);
    }
    button {
      width: 100%;
      height: 38px;
      margin-top: 8px;
      border: 0;
      border-radius: 10px;
      background: #005bff;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }
    button:hover { background: #004bd1; }
    button.ghost {
      border: 1px solid #d8e0eb;
      background: #fff;
      color: #344054;
    }
    button.ghost:hover { background: #f8fafc; }
    .hint {
      margin: 10px 14px 14px;
      color: #667085;
      font-size: 12px;
    }
    .err { color: #d92d20; margin-top: 6px; font-size: 12px; }
    .hidden { display: none; }
    .who { color: #027a48; font-size: 12px; margin: 0 0 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head">
      <div class="logo">O</div>
      <div>
        <h1>上品助手插件端</h1>
        <div class="sub">采集当前页面，编辑和发布在管理端完成</div>
      </div>
    </div>

    <div id="bk-card" class="status">
      <div><span class="dot"></span><span id="bk-status">检测后端...</span></div>
      <span id="bk-port" class="sub"></span>
    </div>

    <details class="card" id="dev-box">
      <summary class="card-title" style="cursor:pointer; list-style:none">开发者：自定义后端地址</summary>
      <input id="backend-base" placeholder="如 http://127.0.0.1:8585（留空=默认服务器）" />
      <button id="backend-save">保存并重连</button>
      <button id="backend-clear" class="ghost">清除（恢复默认服务器）</button>
      <p class="hint" style="margin:8px 0 0">用户版默认直连服务器；本地开发时填本机地址即可覆盖。</p>
    </details>

    <div class="card">
      <div class="card-title">工作流</div>
      <div class="flow">
        <span>1 采集</span>
        <span>2 草稿编辑</span>
        <span>3 发布 Ozon</span>
      </div>
    </div>

    <div id="login-box" class="card">
      <div class="card-title">登录管理端</div>
      <input id="username" placeholder="用户名" autocomplete="username" />
      <input id="password" type="password" placeholder="密码" autocomplete="current-password" />
      <button id="login-btn">登录</button>
      <p id="login-err" class="err hidden"></p>
    </div>

    <div id="user-box" class="card hidden">
      <p class="who" id="who"></p>
      <button id="open-admin">打开管理端</button>
      <button id="logout-btn" class="ghost">退出登录</button>
    </div>

    <p class="hint">在 Ozon / WB 商品页右下角浮层采集商品；1688 采集入口接入后也放在页面浮层，不放在后台管理页。</p>
  </div>
  <script src="../common/bridge.js"></script>
  <script src="popup.js"></script>
</body>
</html>
